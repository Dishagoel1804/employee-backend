version: '3.8'

services:

  # ─── MySQL Database ───────────────────────────────────────
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employee_db
    ports:
      - "3306:3306"
    networks:
      - employee-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ─── Spring Boot Backend ──────────────────────────────────
  app:
    build:
      context: .
    container_name: employee-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/employee_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - employee-network

  # ─── React Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ../employee-frontend
    container_name: employee-frontend
    ports:
      - "5173:5173"
    depends_on:
      - app
    networks:
      - employee-network

# ─── Shared Network ───────────────────────────────────────
networks:
  employee-network:
    driver: bridge